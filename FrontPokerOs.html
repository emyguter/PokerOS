<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PokerOS — Ligas & Clubes</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0c0e0b;--surface:#111510;--surface2:#181c16;--surface3:#1a2a1a;
  --gold:#c9a84c;--gold-dim:rgba(201,168,76,0.45);--gold-faint:rgba(201,168,76,0.1);--gold-border:rgba(201,168,76,0.2);
  --ivory:#f0ede4;--ivory-dim:rgba(240,237,228,0.55);--ivory-faint:rgba(240,237,228,0.12);
  --green-light:#7dc97d;--red:#e07070;
  --border:rgba(201,168,76,0.18);--border2:rgba(201,168,76,0.07);
}
html,body{min-height:100%;background:var(--bg);color:var(--ivory);font-family:'DM Sans',sans-serif;}

/* TOPBAR */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);height:48px;display:flex;align-items:center;padding:0 20px;gap:12px;position:sticky;top:0;z-index:100;}
.logo-icon{width:26px;height:26px;background:var(--surface3);border:1px solid var(--gold);border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo-name{font-family:'Playfair Display',serif;font-size:14px;color:var(--gold);}
.logo-sub{font-size:8px;color:var(--gold-dim);text-transform:uppercase;letter-spacing:2px;}
.topbar-title{flex:1;text-align:center;font-size:12px;color:var(--gold);font-weight:500;}
.avatar{width:28px;height:28px;border-radius:50%;background:var(--surface3);border:1px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--gold);font-weight:500;}

.content{max-width:760px;margin:0 auto;padding:24px 16px 40px;}
.page-title{font-family:'Playfair Display',serif;font-size:22px;color:var(--gold);margin-bottom:3px;}
.page-sub{font-size:9px;color:var(--gold-dim);text-transform:uppercase;letter-spacing:2px;margin-bottom:20px;}

/* SEARCH */
.search-bar{display:flex;gap:8px;margin-bottom:16px;}
.search-input{flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:7px;padding:9px 14px;font-size:12px;color:var(--ivory);font-family:'DM Sans',sans-serif;outline:none;}
.search-input:focus{border-color:var(--gold);}
.search-input::placeholder{color:var(--ivory-faint);}
.btn-add{padding:9px 16px;background:var(--gold);color:#0c0e0b;border:none;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;}

/* LEAGUE CARD */
.league-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:12px;overflow:hidden;}
.league-header{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;user-select:none;}
.league-header:hover{background:var(--surface2);}
.league-chevron{font-size:10px;color:var(--gold-dim);transition:transform 0.2s;flex-shrink:0;}
.league-chevron.open{transform:rotate(180deg);}
.league-name{font-family:'Playfair Display',serif;font-size:16px;color:var(--gold);flex:1;}
.league-meta{display:flex;gap:8px;align-items:center;}
.badge{font-size:9px;padding:2px 8px;border-radius:10px;background:var(--gold-faint);border:1px solid var(--gold-border);color:var(--gold);}
.badge-usd{background:rgba(175,169,236,0.1);border-color:rgba(175,169,236,0.25);color:#afa9ec;}
.league-clubs-count{font-size:11px;color:var(--ivory-dim);}

/* CLUBS LIST */
.clubs-list{display:none;border-top:1px solid var(--border2);}
.clubs-list.open{display:block;}
.club-row{display:flex;align-items:center;gap:12px;padding:11px 18px;border-bottom:1px solid var(--border2);transition:background 0.1s;}
.club-row:last-child{border-bottom:none;}
.club-row:hover{background:var(--surface2);}
.club-name{flex:1;font-size:13px;color:var(--ivory);}
.club-id{font-family:'DM Mono',monospace;font-size:10px;color:var(--ivory-dim);width:80px;flex-shrink:0;}
.club-type{font-size:9px;padding:2px 7px;border-radius:4px;flex-shrink:0;}
.type-dinamica{background:rgba(61,110,61,0.15);color:var(--green-light);border:1px solid rgba(61,110,61,0.3);}
.type-fixa{background:var(--gold-faint);color:var(--gold);border:1px solid var(--gold-border);}
.type-rakeback{background:rgba(175,169,236,0.1);color:#afa9ec;border:1px solid rgba(175,169,236,0.25);}
.type-usd{background:rgba(224,112,112,0.1);color:var(--red);border:1px solid rgba(224,112,112,0.25);}
.club-rules{display:flex;gap:8px;flex-shrink:0;}
.rule-tag{font-size:10px;color:var(--ivory-dim);}
.rule-tag span{color:var(--gold);}
.btn-edit{padding:5px 12px;background:transparent;border:1px solid var(--border);color:var(--ivory-dim);border-radius:5px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;flex-shrink:0;transition:all 0.15s;}
.btn-edit:hover{border-color:var(--gold);color:var(--gold);}

/* LOADING */
.loading{padding:32px;text-align:center;font-size:12px;color:var(--ivory-faint);}
.spinner-sm{width:16px;height:16px;border:1.5px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;display:inline-block;margin-right:8px;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}

/* MODAL EDIT */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:500;display:none;align-items:center;justify-content:center;padding:16px;}
.modal-bg.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;}
.modal-header{padding:18px 20px 0;display:flex;justify-content:space-between;align-items:center;}
.modal-title{font-family:'Playfair Display',serif;font-size:18px;color:var(--gold);}
.modal-close{width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ivory-dim);border-radius:4px;}
.modal-close:hover{color:var(--ivory);}
.modal-body{padding:16px 20px 20px;}
.form-section{font-size:9px;color:var(--gold-dim);text-transform:uppercase;letter-spacing:2px;margin:14px 0 8px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.field{margin-bottom:0;}
.field label{display:block;font-size:9px;color:var(--gold-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.field input,.field select{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:6px;padding:8px 11px;font-size:12px;color:var(--ivory);font-family:'DM Sans',sans-serif;outline:none;}
.field input:focus,.field select:focus{border-color:var(--gold);}
.field select option{background:var(--surface);}
.modal-footer{padding:12px 20px 18px;display:flex;gap:8px;justify-content:flex-end;border-top:1px solid var(--border2);}
.btn-cancel{padding:9px 18px;background:transparent;border:1px solid var(--border);color:var(--ivory-dim);border-radius:6px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-save{padding:9px 18px;background:var(--gold);color:#0c0e0b;border:none;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;}

/* CONFIRM DIALOG */
.confirm-bg{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:600;display:none;align-items:center;justify-content:center;padding:16px;}
.confirm-bg.open{display:flex;}
.confirm-box{background:var(--surface);border:1px solid var(--gold-border);border-radius:10px;width:100%;max-width:360px;padding:24px 22px;}
.confirm-title{font-size:15px;font-weight:500;color:var(--ivory);margin-bottom:8px;}
.confirm-text{font-size:12px;color:var(--ivory-dim);line-height:1.6;margin-bottom:20px;}
.confirm-text strong{color:var(--gold);}
.confirm-btns{display:flex;gap:8px;justify-content:flex-end;}
.btn-confirm-cancel{padding:9px 18px;background:transparent;border:1px solid var(--border);color:var(--ivory-dim);border-radius:6px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-confirm-ok{padding:9px 18px;background:var(--gold);color:#0c0e0b;border:none;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 20px;font-size:12px;color:var(--ivory);box-shadow:0 4px 20px rgba(0,0,0,0.4);z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
.toast.success{border-color:rgba(125,201,125,0.4);color:var(--green-light);}
.toast.error{border-color:rgba(224,112,112,0.4);color:var(--red);}

.footer{background:var(--surface);border-top:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;margin-top:20px;}
.footer-tag{font-family:'Playfair Display',serif;font-style:italic;font-size:10px;color:var(--gold-dim);}
.suits{display:flex;gap:10px;}
.suit{font-size:14px;color:var(--gold);opacity:0.3;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--gold-border);border-radius:2px;}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo-icon">
    <svg width="14" height="14" viewBox="0 0 20 20" fill="none">
      <path d="M10 2L3 7v6l7 5 7-5V7L10 2z" stroke="#c9a84c" stroke-width="1.4" stroke-linejoin="round"/>
      <circle cx="10" cy="10" r="2" fill="#c9a84c"/>
    </svg>
  </div>
  <div><div class="logo-name">PokerOS</div><div class="logo-sub">League Platform</div></div>
  <div class="topbar-title">Ligas & Clubes</div>
  <div class="avatar">EM</div>
</div>

<div class="content">
  <div class="page-title">Ligas & Clubes</div>
  <div class="page-sub">Cadastro e configuração de regras · Admin</div>

  <div class="search-bar">
    <input class="search-input" type="text" placeholder="Buscar clube..." id="searchInput" oninput="filterClubs()"/>
    <button class="btn-add" onclick="openAddClub()">+ Novo Clube</button>
  </div>

  <div id="leaguesList">
    <div class="loading"><span class="spinner-sm"></span>Carregando ligas e clubes...</div>
  </div>
</div>

<!-- MODAL EDITAR/ADICIONAR CLUBE -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Editar Clube</div>
      <div class="modal-close" onclick="closeModal()">✕</div>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editClubId"/>
      <input type="hidden" id="editClubName"/>

      <div class="form-section">Identificação</div>
      <div class="form-grid">
        <div class="field"><label>Nome do Clube</label><input type="text" id="fName"/></div>
        <div class="field"><label>ID Externo (App)</label><input type="text" id="fExtId"/></div>
        <div class="field">
          <label>Liga</label>
          <select id="fLeague"></select>
        </div>
        <div class="field">
          <label>Tipo de Acerto</label>
          <select id="fType" onchange="toggleFields()">
            <option value="taxa_dinamica">Taxa Dinâmica</option>
            <option value="taxa_fixa_variavel">Taxa Fixa/Variável</option>
            <option value="weekly_usd">Weekly USD</option>
            <option value="rakeback">Rakeback</option>
          </select>
        </div>
        <div class="field">
          <label>Moeda</label>
          <select id="fMoeda">
            <option value="BRL">BRL</option>
            <option value="USD">USD</option>
          </select>
        </div>
      </div>

      <div id="fieldsTaxaDinamica">
        <div class="form-section">Regras de Cálculo</div>
        <div class="form-grid">
          <div class="field"><label>Taxa MTT %</label><input type="number" step="0.1" id="fFeeMTT"/></div>
          <div class="field"><label>Taxa Cash %</label><input type="number" step="0.1" id="fFeeCash"/></div>
          <div class="field"><label>Taxa Operacional %</label><input type="number" step="0.1" id="fTaxaOp"/></div>
          <div class="field"><label>Spinup %</label><input type="number" step="0.1" id="fSpinup"/></div>
          <div class="field"><label>Rebate %</label><input type="number" step="0.1" id="fRebate"/></div>
          <div class="field"><label>Security (R$)</label><input type="number" step="0.01" id="fSecurity"/></div>
        </div>
      </div>

      <div id="fieldsRakeback" style="display:none">
        <div class="form-section">Regras de Cálculo</div>
        <div class="form-grid">
          <div class="field"><label>Rakeback %</label><input type="number" step="0.1" id="fRakeback"/></div>
        </div>
      </div>

      <div id="fieldsUSD" style="display:none">
        <div class="form-section">Regras de Cálculo</div>
        <div class="form-grid">
          <div class="field"><label>Fee %</label><input type="number" step="0.1" id="fFeeUSD"/></div>
          <div class="field"><label>Rebate %</label><input type="number" step="0.1" id="fRebateUSD"/></div>
          <div class="field"><label>Crypto Rebate %</label><input type="number" step="0.1" id="fCryptoRebate"/></div>
          <div class="field"><label>Security (USD)</label><input type="number" step="0.01" id="fSecurityUSD"/></div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="confirmSave()">Salvar alterações</button>
    </div>
  </div>
</div>

<!-- CONFIRM DIALOG -->
<div class="confirm-bg" id="confirmBg">
  <div class="confirm-box">
    <div class="confirm-title">Confirmar alteração</div>
    <div class="confirm-text" id="confirmText"></div>
    <div class="confirm-btns">
      <button class="btn-confirm-cancel" onclick="closeConfirm()">Cancelar</button>
      <button class="btn-confirm-ok" onclick="doSave()">Confirmar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="footer">
  <div class="footer-tag">"From game data to financial settlements — automatically."</div>
  <div class="suits"><span class="suit">♠</span><span class="suit">♥</span><span class="suit">♦</span><span class="suit">♣</span></div>
</div>

<script>
const SUPABASE_URL = 'https://gebfitjjeyfogqyjqaij.supabase.co';
const SUPABASE_KEY = 'sb_publishable_97_5LwcW7aqP1Ux0D8Zzcg_hHLlRH-v';

let allLeagues = [], allClubs = [], pendingSave = null;

const h = {
  'Content-Type':'application/json',
  'apikey': SUPABASE_KEY,
  'Authorization': `Bearer ${SUPABASE_KEY}`,
  'Prefer': 'return=representation'
};

async function api(method, path, body) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    method, headers: h,
    body: body ? JSON.stringify(body) : undefined
  });
  const txt = await res.text();
  return txt ? JSON.parse(txt) : [];
}

async function load() {
  const [leagues, clubs] = await Promise.all([
    api('GET', 'leagues?select=id,name,moeda&order=name'),
    api('GET', 'clubs?select=*&order=name')
  ]);
  allLeagues = leagues;
  allClubs = clubs;
  render();
  populateLeagueSelect();
}

function typeLabel(t) {
  const m = {taxa_dinamica:'Taxa Dinâmica',taxa_fixa_variavel:'Taxa Fixa/Var.',weekly_usd:'Weekly USD',rakeback:'Rakeback'};
  return m[t] || t;
}
function typeClass(t) {
  const m = {taxa_dinamica:'type-dinamica',taxa_fixa_variavel:'type-fixa',weekly_usd:'type-usd',rakeback:'type-rakeback'};
  return m[t] || '';
}

function rulesSummary(c) {
  if(c.settlement_type === 'rakeback')
    return `<span class="rule-tag">RB <span>${c.rakeback_pct}%</span></span>`;
  if(c.settlement_type === 'weekly_usd')
    return `<span class="rule-tag">Fee <span>${c.fee_mtt_pct}%</span></span>
            <span class="rule-tag">Rebate <span>${c.rebate_pct}%</span></span>
            ${c.crypto_rebate_pct>0?`<span class="rule-tag">Crypto <span>${c.crypto_rebate_pct}%</span></span>`:''}`;
  return `<span class="rule-tag">MTT <span>${c.fee_mtt_pct}%</span></span>
          <span class="rule-tag">Op <span>${c.taxa_op_pct}%</span></span>
          ${c.rebate_pct>0?`<span class="rule-tag">Rebate <span>${c.rebate_pct}%</span></span>`:''}`;
}

function render(filter='') {
  const container = document.getElementById('leaguesList');
  if(!allLeagues.length){container.innerHTML='<div class="loading">Nenhuma liga cadastrada</div>';return;}

  container.innerHTML = allLeagues.map(league => {
    const clubs = allClubs.filter(c =>
      c.league_id === league.id &&
      (!filter || c.name.toLowerCase().includes(filter.toLowerCase()))
    );
    if(filter && !clubs.length) return '';

    return `<div class="league-card">
      <div class="league-header" onclick="toggleLeague('${league.id}')">
        <span class="league-chevron open" id="chev-${league.id}">▼</span>
        <span class="league-name">${league.name}</span>
        <div class="league-meta">
          <span class="badge ${league.moeda==='USD'?'badge-usd':''}">${league.moeda||'BRL'}</span>
          <span class="league-clubs-count">${clubs.length} clubes</span>
        </div>
      </div>
      <div class="clubs-list open" id="list-${league.id}">
        ${clubs.length===0
          ? '<div class="loading" style="padding:16px">Nenhum clube nessa liga</div>'
          : clubs.map(c=>`
            <div class="club-row" id="row-${c.id}">
              <span class="club-id">${c.external_id||'—'}</span>
              <span class="club-name">${c.name}</span>
              <div class="club-rules">${rulesSummary(c)}</div>
              <span class="club-type ${typeClass(c.settlement_type)}">${typeLabel(c.settlement_type)}</span>
              <button class="btn-edit" onclick="openEdit('${c.id}')">Editar</button>
            </div>`).join('')
        }
      </div>
    </div>`;
  }).join('');
}

function toggleLeague(id) {
  const list = document.getElementById(`list-${id}`);
  const chev = document.getElementById(`chev-${id}`);
  list.classList.toggle('open');
  chev.classList.toggle('open');
}

function filterClubs() {
  render(document.getElementById('searchInput').value);
}

function populateLeagueSelect() {
  const sel = document.getElementById('fLeague');
  sel.innerHTML = allLeagues.map(l=>`<option value="${l.id}">${l.name}</option>`).join('');
}

function toggleFields() {
  const t = document.getElementById('fType').value;
  document.getElementById('fieldsTaxaDinamica').style.display = (t==='taxa_dinamica'||t==='taxa_fixa_variavel') ? 'block' : 'none';
  document.getElementById('fieldsRakeback').style.display = t==='rakeback' ? 'block' : 'none';
  document.getElementById('fieldsUSD').style.display = t==='weekly_usd' ? 'block' : 'none';
}

function openEdit(clubId) {
  const c = allClubs.find(x=>x.id===clubId);
  if(!c) return;
  document.getElementById('modalTitle').textContent = `Editar — ${c.name}`;
  document.getElementById('editClubId').value = c.id;
  document.getElementById('editClubName').value = c.name;
  document.getElementById('fName').value = c.name;
  document.getElementById('fExtId').value = c.external_id||'';
  document.getElementById('fLeague').value = c.league_id;
  document.getElementById('fType').value = c.settlement_type;
  document.getElementById('fMoeda').value = c.moeda||'BRL';
  // Campos dinâmica
  document.getElementById('fFeeMTT').value = c.fee_mtt_pct||0;
  document.getElementById('fFeeCash').value = c.fee_cash_pct||0;
  document.getElementById('fTaxaOp').value = c.taxa_op_pct||0;
  document.getElementById('fSpinup').value = c.spinup_pct||0;
  document.getElementById('fRebate').value = c.rebate_pct||0;
  document.getElementById('fSecurity').value = c.security||0;
  // Rakeback
  document.getElementById('fRakeback').value = c.rakeback_pct||0;
  // USD
  document.getElementById('fFeeUSD').value = c.fee_mtt_pct||0;
  document.getElementById('fRebateUSD').value = c.rebate_pct||0;
  document.getElementById('fCryptoRebate').value = c.crypto_rebate_pct||0;
  document.getElementById('fSecurityUSD').value = c.security||0;
  toggleFields();
  document.getElementById('modalBg').classList.add('open');
}

function openAddClub() {
  document.getElementById('modalTitle').textContent = 'Novo Clube';
  document.getElementById('editClubId').value = '';
  document.getElementById('editClubName').value = '';
  ['fName','fExtId','fFeeMTT','fFeeCash','fTaxaOp','fSpinup','fRebate','fSecurity',
   'fRakeback','fFeeUSD','fRebateUSD','fCryptoRebate','fSecurityUSD'].forEach(id=>{
    document.getElementById(id).value = '';
  });
  document.getElementById('fType').value = 'taxa_dinamica';
  document.getElementById('fMoeda').value = 'BRL';
  toggleFields();
  document.getElementById('modalBg').classList.add('open');
}

function closeModal() {
  document.getElementById('modalBg').classList.remove('open');
}

function confirmSave() {
  const name = document.getElementById('fName').value.trim();
  if(!name){showToast('Nome do clube é obrigatório','error');return;}
  const clubId = document.getElementById('editClubId').value;
  const isEdit = !!clubId;
  const originalName = document.getElementById('editClubName').value;

  pendingSave = buildPayload();
  pendingSave._id = clubId;
  pendingSave._isEdit = isEdit;

  document.getElementById('confirmText').innerHTML = isEdit
    ? `Você está alterando as regras de <strong>${originalName}</strong>.<br>Essa ação afeta os cálculos futuros.`
    : `Você está cadastrando o clube <strong>${name}</strong>.`;

  document.getElementById('confirmBg').classList.add('open');
}

function buildPayload() {
  const t = document.getElementById('fType').value;
  const p = {
    name: document.getElementById('fName').value.trim(),
    external_id: document.getElementById('fExtId').value.trim(),
    league_id: document.getElementById('fLeague').value,
    settlement_type: t,
    moeda: document.getElementById('fMoeda').value,
    fee_mtt_pct: 0, fee_cash_pct: 0, taxa_op_pct: 0,
    spinup_pct: 0, rebate_pct: 0, crypto_rebate_pct: 0,
    rakeback_pct: 0, security: 0,
  };
  if(t==='taxa_dinamica'||t==='taxa_fixa_variavel'){
    p.fee_mtt_pct   = parseFloat(document.getElementById('fFeeMTT').value)||0;
    p.fee_cash_pct  = parseFloat(document.getElementById('fFeeCash').value)||0;
    p.taxa_op_pct   = parseFloat(document.getElementById('fTaxaOp').value)||0;
    p.spinup_pct    = parseFloat(document.getElementById('fSpinup').value)||0;
    p.rebate_pct    = parseFloat(document.getElementById('fRebate').value)||0;
    p.security      = parseFloat(document.getElementById('fSecurity').value)||0;
  } else if(t==='rakeback') {
    p.rakeback_pct  = parseFloat(document.getElementById('fRakeback').value)||0;
  } else if(t==='weekly_usd') {
    p.fee_mtt_pct       = parseFloat(document.getElementById('fFeeUSD').value)||0;
    p.rebate_pct        = parseFloat(document.getElementById('fRebateUSD').value)||0;
    p.crypto_rebate_pct = parseFloat(document.getElementById('fCryptoRebate').value)||0;
    p.security          = parseFloat(document.getElementById('fSecurityUSD').value)||0;
  }
  return p;
}

function closeConfirm() {
  document.getElementById('confirmBg').classList.remove('open');
  pendingSave = null;
}

async function doSave() {
  closeConfirm();
  closeModal();
  if(!pendingSave) return;

  const {_id, _isEdit, ...payload} = pendingSave;

  try {
    if(_isEdit) {
      await api('PATCH', `clubs?id=eq.${_id}`, payload);
      // Atualiza local
      const idx = allClubs.findIndex(c=>c.id===_id);
      if(idx>=0) allClubs[idx] = {...allClubs[idx], ...payload};
      showToast('Clube atualizado com sucesso ✓','success');
    } else {
      const result = await api('POST', 'clubs', payload);
      if(Array.isArray(result) && result[0]) allClubs.push(result[0]);
      showToast('Clube cadastrado com sucesso ✓','success');
    }
    render(document.getElementById('searchInput').value);
  } catch(e) {
    showToast('Erro ao salvar','error');
    console.error(e);
  }
  pendingSave = null;
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type} show`;
  setTimeout(()=>t.classList.remove('show'), 3000);
}

load();
</script>
</body>
</html>
